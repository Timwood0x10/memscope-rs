<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}} - Multithread Memory Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 1.1rem;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
        }
        
        .metric-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .metric-card .label {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section h2::before {
            content: '';
            width: 4px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        
        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            height: 400px;
            margin-bottom: 20px;
        }
        
        .thread-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .thread-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .thread-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .thread-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        .thread-card .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .thread-card .stat-label {
            color: #666;
        }
        
        .thread-card .stat-value {
            font-weight: 600;
            color: #333;
        }
        
        .conflict-list {
            background: #fff5f5;
            border: 2px solid #fc8181;
            border-radius: 12px;
            padding: 20px;
        }
        
        .conflict-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #fc8181;
        }
        
        .conflict-item:last-child {
            margin-bottom: 0;
        }
        
        .conflict-item h4 {
            color: #c53030;
            margin-bottom: 8px;
        }
        
        .conflict-item p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }
        
        .conflict-item .meta {
            font-size: 0.85rem;
            color: #999;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧵 Multithread Memory Analysis</h1>
            <p class="subtitle">Thread-specific memory usage and interaction analysis</p>
        </div>
        
        <!-- Metrics Grid -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="value">{{THREAD_COUNT}}</div>
                <div class="label">Threads</div>
            </div>
            <div class="metric-card">
                <div class="value">{{TOTAL_MEMORY}}</div>
                <div class="label">Total Memory</div>
            </div>
            <div class="metric-card">
                <div class="value">{{TOTAL_ALLOCATIONS}}</div>
                <div class="label">Allocations</div>
            </div>
            <div class="metric-card">
                <div class="value">{{CONFLICT_COUNT}}</div>
                <div class="label">Conflicts</div>
            </div>
        </div>
        
        <!-- Thread Distribution Chart -->
        <div class="section">
            <h2>Thread Memory Distribution</h2>
            <div class="chart-container">
                <canvas id="threadDistributionChart"></canvas>
            </div>
        </div>
        
        <!-- Thread Analysis -->
        <div class="section">
            <h2>Thread Analysis</h2>
            <div class="thread-list" id="threadList">
                <!-- Threads will be populated by JavaScript -->
            </div>
        </div>
        
        <!-- Conflict Analysis -->
        <div class="section">
            <h2>Thread Conflicts</h2>
            <div class="conflict-list" id="conflictList">
                <!-- Conflicts will be populated by JavaScript -->
            </div>
        </div>
    </div>
    
    <script>
        // Load thread data from Handlebars template
        window.threadData = {{THREADS_DATA}};
        window.allocationData = {{ALLOCATION_DATA}};
        window.conflictData = {{CONFLICT_DATA}};
        
        console.log('✅ Thread data loaded:', {
            threads: window.threadData,
            allocations: window.allocationData,
            conflicts: window.conflictData
        });
        
        // Parse JSON data
        let threads = [];
        let allocations = [];
        let conflicts = [];
        
        try {
            threads = JSON.parse(window.threadData || '[]');
            allocations = JSON.parse(window.allocationData || '[]');
            conflicts = JSON.parse(window.conflictData || '[]');
        } catch (e) {
            console.error('❌ Failed to parse data:', e);
        }
        
        // Render thread distribution chart
        function renderThreadChart() {
            const ctx = document.getElementById('threadDistributionChart').getContext('2d');
            
            const labels = threads.map(t => `Thread ${t.id}`);
            const memoryData = threads.map(t => t.memory);
            const allocationData = threads.map(t => t.allocations);
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Memory (bytes)',
                            data: memoryData,
                            backgroundColor: 'rgba(102, 126, 234, 0.7)',
                            borderColor: 'rgba(102, 126, 234, 1)',
                            borderWidth: 2,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Allocations',
                            data: allocationData,
                            backgroundColor: 'rgba(118, 75, 162, 0.7)',
                            borderColor: 'rgba(118, 75, 162, 1)',
                            borderWidth: 2,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Memory (bytes)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Allocations'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        }
                    }
                }
            });
        }
        
        // Render thread list
        function renderThreadList() {
            const container = document.getElementById('threadList');
            
            if (threads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🧵</div>
                        <p>No thread data available</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = threads.map(thread => `
                <div class="thread-card">
                    <h3>Thread ${thread.id}</h3>
                    <div class="stat">
                        <span class="stat-label">Status:</span>
                        <span class="stat-value">${thread.status}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Allocations:</span>
                        <span class="stat-value">${thread.allocations}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Memory:</span>
                        <span class="stat-value">${formatBytes(thread.memory)}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Peak Memory:</span>
                        <span class="stat-value">${formatBytes(thread.peak)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // Render conflict list
        function renderConflictList() {
            const container = document.getElementById('conflictList');
            
            if (conflicts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">✅</div>
                        <p>No conflicts detected</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = conflicts.map(conflict => `
                <div class="conflict-item">
                    <h4>${conflict.type}</h4>
                    <p><strong>Description:</strong> ${conflict.description}</p>
                    <p><strong>Threads:</strong> ${conflict.threads}</p>
                    <div class="meta">Conflict detected during memory analysis</div>
                </div>
            `).join('');
        }
        
        // Format bytes to human-readable
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderThreadChart();
            renderThreadList();
            renderConflictList();
        });
    </script>
</body>
</html>
